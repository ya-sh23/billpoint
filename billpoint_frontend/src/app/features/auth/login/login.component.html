<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <!-- Logo -->
    <div class="flex justify-center flex-row items-center gap-2 cursor-pointer mb-2" routerLink="/">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <path d="M16 10a4 4 0 0 1-8 0"></path>
      </svg>
      <span class="text-3xl font-bold text-gray-900 tracking-tight">Grocery<span class="text-primary">Go</span></span>
    </div>
    <h2 class="mt-4 text-center text-3xl font-extrabold text-gray-900">
      Welcome Back
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Select your role to sign in to your dashboard
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
      
      <!-- Role Selection -->
      <div class="mb-8">
        <div class="grid grid-cols-2 gap-3 sm:grid-cols-4">
          <!-- Customer -->
          <button type="button" 
                  (click)="setRole('CUSTOMER')" 
                  [ngClass]="selectedRole === 'CUSTOMER' ? 'bg-primary text-white ring-2 ring-primary ring-offset-2' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                  class="flex flex-col items-center justify-center border rounded-lg py-3 px-2 text-xs font-medium transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            Customer
          </button>

          <!-- Staff -->
          <button type="button" 
                  (click)="setRole('STAFF')" 
                  [ngClass]="selectedRole === 'STAFF' ? 'bg-primary text-white ring-2 ring-primary ring-offset-2' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                  class="flex flex-col items-center justify-center border rounded-lg py-3 px-2 text-xs font-medium transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            Staff
          </button>

          <!-- Shop Owner -->
          <button type="button" 
                  (click)="setRole('SHOP_OWNER')" 
                  [ngClass]="selectedRole === 'SHOP_OWNER' ? 'bg-primary text-white ring-2 ring-primary ring-offset-2' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                  class="flex flex-col items-center justify-center border rounded-lg py-3 px-2 text-xs font-medium transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
            Seller
          </button>

          <!-- Admin -->
          <button type="button" 
                  (click)="setRole('ADMIN')" 
                  [ngClass]="selectedRole === 'ADMIN' ? 'bg-primary text-white ring-2 ring-primary ring-offset-2' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                  class="flex flex-col items-center justify-center border rounded-lg py-3 px-2 text-xs font-medium transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
            Admin
          </button>
        </div>
      </div>

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <span class="block text-center text-sm font-semibold text-gray-700 mb-4 bg-gray-50 py-2 rounded-md">
          Signing in as: <span class="text-primary">{{ selectedRole }}</span>
        </span>

        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">
            Username
          </label>
          <div class="mt-1">
            <input id="username" formControlName="username" type="text" autocomplete="username" required 
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Password
          </label>
          <div class="mt-1">
            <input id="password" formControlName="password" type="password" autocomplete="current-password" required 
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-900">
              Remember me
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-primary hover:text-primary-dull transition-colors">
              Forgot password?
            </a>
          </div>
        </div>

        <div *ngIf="error" class="bg-red-50 p-3 rounded-md text-sm text-red-600 border border-red-100 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            {{ error }}
        </div>

        <div>
          <button type="submit" [disabled]="loginForm.invalid || loading" 
                  class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dull focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300">
            <span *ngIf="loading">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Signing in...
            </span>
            <span *ngIf="!loading">Sign In</span>
          </button>
        </div>
      </form>

      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">
              New to BillPoint?
            </span>
          </div>
        </div>

        <div class="mt-6">
          <a routerLink="/register" class="w-full flex justify-center py-2.5 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200">
            Create an account
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
